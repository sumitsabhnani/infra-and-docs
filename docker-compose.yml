services:
  postgres:
    image: postgres:15-alpine
    container_name: portfolio-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: portfolio-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: ../portfolio-optimizer-backend
      dockerfile: Dockerfile
    image: portfolio-optimizer-backend:latest
    container_name: portfolio-optimizer-backend
    environment:
      # Datasource — Flyway runs automatically on startup
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"

      # Redis cache
      REDIS_HOST: redis
      REDIS_PORT: "6379"

      # App
      APP_BASE_URL: ${APP_BASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      INTERNAL_ADMIN_TOKEN: ${INTERNAL_ADMIN_TOKEN}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}

      # OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID}
      APPLE_KEY_ID: ${APPLE_KEY_ID}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY}

      # Broker + market data
      SNAPTRADE_CLIENT_ID: ${SNAPTRADE_CLIENT_ID}
      SNAPTRADE_CONSUMER_KEY: ${SNAPTRADE_CONSUMER_KEY}
      SNAPTRADE_REDIRECT_URI: ${SNAPTRADE_REDIRECT_URI}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY}
      EODHD_API_KEY: ${EODHD_API_KEY}
      OPENFIGI_API_KEY: ${OPENFIGI_API_KEY}
      ZERODHA_API_KEY: ${ZERODHA_API_KEY}
      ZERODHA_API_SECRET: ${ZERODHA_API_SECRET}
      BHAVKOSH_API_KEY: ${BHAVKOSH_API_KEY}

      # FIGI batch poller — claims figi_resolution_queue rows and calls OpenFIGI
      # off the hot path. Default in code is true; set explicitly to make
      # the deployment self-documenting and prevent silent disablement.
      FIGI_POLLER_ENABLED: "true"

      # AI / notifications / storage
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_ADDRESS: ${RESEND_FROM_ADDRESS}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET}

      # Price sweeper microservice
      PRICE_SWEEPER_BASE_URL: http://price-sweeper:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    mem_limit: 3g
    mem_reservation: 1g
    networks:
      - app-network
    restart: unless-stopped

  price-sweeper:
    build:
      context: ../price-sweeper
      dockerfile: Dockerfile
    image: portfolio-price-sweeper:latest
    container_name: portfolio-price-sweeper
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ../portfolio-optimizer-frontend
      dockerfile: Dockerfile
    image: portfolio-optimizer-frontend:latest
    container_name: portfolio-optimizer-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - app-network

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:9999:8080" # Binds only to local loopback for security
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
